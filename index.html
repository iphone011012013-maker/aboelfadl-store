<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AboElfadl Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --card: #1e1e2e;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --gold: #ffd700;
      --text: #e8e8f0;
      --muted: #8888aa;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── HEADER ── */
    header {
      background:var(--surface);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
      backdrop-filter:blur(12px);
    }
    .header-inner {
      max-width:1280px; margin:auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 24px; gap:16px;
    }
    .logo { font-size:1.5rem; font-weight:900; color:var(--accent); text-decoration:none; white-space:nowrap; }
    .logo span { color:var(--accent2); }
    .search-wrap { flex:1; max-width:480px; position:relative; }
    .search-wrap input {
      width:100%; padding:10px 16px 10px 44px;
      background:var(--card); border:1px solid var(--border);
      border-radius:50px; color:var(--text); font-family:'Cairo',sans-serif;
      font-size:.95rem; outline:none; transition:.2s;
    }
    .search-wrap input:focus { border-color:var(--accent); }
    .search-wrap .icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1.1rem; }
    .cart-btn {
      position:relative; background:var(--accent); border:none; border-radius:50px;
      color:#fff; padding:10px 20px; font-family:'Cairo',sans-serif; font-size:.95rem;
      cursor:pointer; display:flex; align-items:center; gap:8px; white-space:nowrap;
      transition:.2s;
    }
    .cart-btn:hover { background:#7c74ff; }
    .cart-count {
      position:absolute; top:-6px; left:-6px;
      background:var(--accent2); color:#fff; font-size:.7rem;
      width:20px; height:20px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-weight:700;
    }

    /* ── HERO ── */
    .hero {
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      padding:60px 24px; text-align:center;
    }
    .hero h1 { font-size:clamp(1.8rem,4vw,3rem); font-weight:900; margin-bottom:12px; }
    .hero h1 span { color:var(--accent); }
    .hero p { color:var(--muted); font-size:1.05rem; max-width:500px; margin:auto; }

    /* ── CATEGORIES ── */
    .cats { max-width:1280px; margin:32px auto 0; padding:0 24px; }
    .cats-scroll {
      display:flex; gap:10px; overflow-x:auto; padding-bottom:8px;
      scrollbar-width:none;
    }
    .cats-scroll::-webkit-scrollbar { display:none; }
    .cat-btn {
      flex-shrink:0; padding:8px 20px; border-radius:50px;
      border:1px solid var(--border); background:var(--card);
      color:var(--muted); font-family:'Cairo',sans-serif; font-size:.9rem;
      cursor:pointer; transition:.2s;
    }
    .cat-btn.active, .cat-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ── PRODUCTS ── */
    .products-section { max-width:1280px; margin:32px auto; padding:0 24px; }
    .section-title {
      font-size:1.3rem; font-weight:700; margin-bottom:20px;
      display:flex; align-items:center; gap:10px;
    }
    .section-title::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:20px;
    }

    /* ── PRODUCT CARD ── */
    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
      cursor:pointer; transition:.25s; position:relative;
    }
    .card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:var(--shadow); }
    .card-img { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--surface); display:block; }
    .card-body { padding:14px; }
    .card-cat { font-size:.75rem; color:var(--accent); font-weight:600; margin-bottom:4px; }
    .card-name { font-size:1rem; font-weight:700; margin-bottom:8px; line-height:1.4; }
    .card-price { display:flex; align-items:center; gap:8px; }
    .price-now { font-size:1.15rem; font-weight:900; color:var(--accent); }
    .price-old { font-size:.85rem; color:var(--muted); text-decoration:line-through; }
    .badge-discount {
      position:absolute; top:10px; right:10px;
      background:var(--accent2); color:#fff;
      font-size:.75rem; font-weight:700; padding:4px 10px; border-radius:50px;
    }
    .badge-featured {
      position:absolute; top:10px; left:10px;
      background:var(--gold); color:#000;
      font-size:.75rem; font-weight:700; padding:4px 10px; border-radius:50px;
    }
    .add-to-cart-btn {
      width:100%; margin-top:12px; padding:10px;
      background:var(--accent); border:none; border-radius:8px;
      color:#fff; font-family:'Cairo',sans-serif; font-size:.9rem;
      font-weight:700; cursor:pointer; transition:.2s;
    }
    .add-to-cart-btn:hover { background:#7c74ff; }

    /* ── EMPTY ── */
    .empty { text-align:center; padding:80px 24px; color:var(--muted); }
    .empty-icon { font-size:4rem; margin-bottom:16px; }

    /* ── CART MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.7);
      z-index:200; display:none; align-items:flex-end;
      justify-content:center; padding:0;
    }
    .modal-overlay.open { display:flex; }
    .cart-modal {
      background:var(--surface); border-radius:var(--radius) var(--radius) 0 0;
      width:100%; max-width:560px; max-height:80vh;
      display:flex; flex-direction:column;
      border:1px solid var(--border);
    }
    .cart-header {
      padding:20px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .cart-header h2 { font-size:1.2rem; font-weight:700; }
    .close-btn { background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
    .cart-items { flex:1; overflow-y:auto; padding:16px 24px; }
    .cart-item {
      display:flex; gap:12px; align-items:center;
      padding:12px 0; border-bottom:1px solid var(--border);
    }
    .cart-item img { width:60px; height:60px; object-fit:cover; border-radius:8px; }
    .cart-item-info { flex:1; }
    .cart-item-name { font-size:.95rem; font-weight:600; }
    .cart-item-price { color:var(--accent); font-weight:700; font-size:.9rem; }
    .cart-item-remove { background:none; border:none; color:var(--accent2); font-size:1.2rem; cursor:pointer; }
    .cart-footer {
      padding:20px 24px; border-top:1px solid var(--border);
    }
    .cart-total { display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; margin-bottom:16px; }
    .checkout-btn {
      width:100%; padding:14px; background:var(--accent); border:none;
      border-radius:var(--radius); color:#fff; font-family:'Cairo',sans-serif;
      font-size:1rem; font-weight:700; cursor:pointer; transition:.2s;
    }
    .checkout-btn:hover { background:#7c74ff; }

    /* ── ORDER MODAL ── */
    .order-modal {
      background:var(--surface); border-radius:var(--radius) var(--radius) 0 0;
      width:100%; max-width:560px; max-height:90vh;
      display:flex; flex-direction:column;
      border:1px solid var(--border);
    }
    .order-modal .form-group { margin-bottom:16px; }
    .order-modal label { display:block; margin-bottom:6px; font-size:.9rem; color:var(--muted); }
    .order-modal input, .order-modal textarea {
      width:100%; padding:12px 16px;
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:'Cairo',sans-serif;
      font-size:.95rem; outline:none; transition:.2s;
    }
    .order-modal input:focus, .order-modal textarea:focus { border-color:var(--accent); }
    .order-modal textarea { resize:vertical; min-height:80px; }
    .order-modal-body { padding:16px 24px; overflow-y:auto; }
    .order-summary { background:var(--card); border-radius:8px; padding:14px; margin-bottom:16px; }
    .order-summary-title { font-weight:700; margin-bottom:8px; }
    .order-summary-item { display:flex; justify-content:space-between; font-size:.9rem; color:var(--muted); margin-bottom:4px; }
    .order-summary-total { display:flex; justify-content:space-between; font-weight:700; color:var(--accent); padding-top:8px; border-top:1px solid var(--border); margin-top:8px; }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
      background:var(--accent); color:#fff; padding:12px 24px;
      border-radius:50px; font-weight:700; z-index:999;
      transition:.3s; white-space:nowrap; font-size:.95rem;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.error { background:var(--accent2); }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:32px 24px;
      border-top:1px solid var(--border);
      color:var(--muted); font-size:.85rem; margin-top:40px;
    }
    footer a { color:var(--accent); text-decoration:none; }

    /* ── LOADING ── */
    .spinner { text-align:center; padding:80px; color:var(--muted); font-size:1rem; }
    .spin { display:inline-block; width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:600px) {
      .header-inner { flex-wrap:wrap; }
      .search-wrap { order:3; flex:1 1 100%; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">AboElfadl<span>Store</span></a>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن منتج..." oninput="filterProducts()"/>
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 السلة
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>مرحباً بك في <span>AboElfadl Store</span></h1>
  <p>اكتشف أفضل المنتجات بأسعار مميزة</p>
</div>

<!-- CATEGORIES -->
<div class="cats">
  <div class="cats-scroll" id="catsContainer">
    <button class="cat-btn active" onclick="filterByCategory('all',this)">الكل</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products-section">
  <!-- Featured -->
  <div id="featuredSection" style="display:none">
    <div class="section-title">⭐ منتجات مميزة</div>
    <div class="grid" id="featuredGrid"></div>
    <div style="height:32px"></div>
  </div>
  <!-- All -->
  <div class="section-title" id="allTitle">🛍️ جميع المنتجات</div>
  <div class="grid" id="productsGrid">
    <div class="spinner"><div class="spin"></div><br>جاري التحميل...</div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 AboElfadl Media — جميع الحقوق محفوظة</p>
  <p style="margin-top:8px"><a href="admin.html">لوحة الإدارة</a></p>
</footer>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartOverlay" onclick="handleOverlayClick(event,'cartOverlay')">
  <div class="cart-modal">
    <div class="cart-header">
      <h2>🛒 سلة المشتريات</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>الإجمالي</span>
        <span id="cartTotal">0 ج.م</span>
      </div>
      <button class="checkout-btn" onclick="openOrder()">إتمام الطلب</button>
    </div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderOverlay" onclick="handleOverlayClick(event,'orderOverlay')">
  <div class="order-modal">
    <div class="cart-header">
      <h2>📦 تأكيد الطلب</h2>
      <button class="close-btn" onclick="closeOrder()">✕</button>
    </div>
    <div class="order-modal-body">
      <div class="order-summary" id="orderSummary"></div>
      <div class="form-group">
        <label>الاسم الكامل *</label>
        <input type="text" id="oName" placeholder="محمد أحمد"/>
      </div>
      <div class="form-group">
        <label>رقم الهاتف *</label>
        <input type="tel" id="oPhone" placeholder="01xxxxxxxxx"/>
      </div>
      <div class="form-group">
        <label>العنوان *</label>
        <textarea id="oAddress" placeholder="المحافظة، المدينة، الشارع..."></textarea>
      </div>
      <div class="form-group">
        <label>ملاحظات (اختياري)</label>
        <textarea id="oNotes" placeholder="أي تفاصيل إضافية..."></textarea>
      </div>
    </div>
    <div class="cart-footer">
      <button class="checkout-btn" onclick="submitOrder()">✅ تأكيد الطلب</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
  let allProducts = [];
  let cart = JSON.parse(localStorage.getItem('aef_cart') || '[]');
  let currentCategory = 'all';

  // ── LOAD PRODUCTS ──
  async function loadProducts() {
    try {
      const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.USERNAME}/${GITHUB_CONFIG.REPO}/refs/heads/${GITHUB_CONFIG.BRANCH}/products.json?t=${Date.now()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();
      allProducts = data.products || [];
      renderCategories(data.categories || []);
      renderAll();
    } catch {
      // fallback: local
      try {
        const res = await fetch(`products.json?t=${Date.now()}`);
        const data = await res.json();
        allProducts = data.products || [];
        renderCategories(data.categories || []);
        renderAll();
      } catch {
        document.getElementById('productsGrid').innerHTML = '<div class="empty"><div class="empty-icon">😕</div><p>تعذّر تحميل المنتجات</p></div>';
      }
    }
    updateCartCount();
  }

  function renderCategories(cats) {
    const c = document.getElementById('catsContainer');
    cats.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'cat-btn';
      b.textContent = cat;
      b.onclick = () => filterByCategory(cat, b);
      c.appendChild(b);
    });
  }

  function renderAll() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = allProducts.filter(p => {
      const matchCat = currentCategory === 'all' || p.category === currentCategory;
      const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.description||'').toLowerCase().includes(search);
      return matchCat && matchSearch;
    });

    // Featured section
    const featured = list.filter(p => p.featured);
    const featuredSection = document.getElementById('featuredSection');
    if (featured.length && currentCategory === 'all' && !search) {
      featuredSection.style.display = 'block';
      document.getElementById('featuredGrid').innerHTML = featured.map(cardHTML).join('');
    } else {
      featuredSection.style.display = 'none';
    }

    const grid = document.getElementById('productsGrid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>لا توجد منتجات</p></div>';
      return;
    }
    grid.innerHTML = list.map(cardHTML).join('');
  }

  function cardHTML(p) {
    const disc = p.discount > 0 ? `<span class="badge-discount">-${p.discount}%</span>` : '';
    const feat = p.featured ? '<span class="badge-featured">⭐ مميز</span>' : '';
    const oldPrice = p.originalPrice > p.price ? `<span class="price-old">${p.originalPrice} ${GITHUB_CONFIG.CURRENCY||'ج.م'}</span>` : '';
    return `
      <div class="card" onclick="goProduct('${p.id}')">
        ${disc}${feat}
        <img class="card-img" src="${p.image||'https://placehold.co/400x400/1e1e2e/666?text=صورة'}" alt="${p.name}" loading="lazy"/>
        <div class="card-body">
          <div class="card-cat">${p.category||'عام'}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price">
            <span class="price-now">${p.price} ج.م</span>
            ${oldPrice}
          </div>
          <button class="add-to-cart-btn" onclick="event.stopPropagation();addToCart('${p.id}')">أضف للسلة 🛒</button>
        </div>
      </div>`;
  }

  function filterByCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  function filterProducts() { renderAll(); }
  function goProduct(id) { window.location.href = `product.html?id=${id}`; }

  // ── CART ──
  function addToCart(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    const ex = cart.find(x => x.id === id);
    if (ex) ex.qty = (ex.qty||1) + 1;
    else cart.push({ id, name:p.name, price:p.price, image:p.image, qty:1 });
    saveCart();
    showToast(`✅ أُضيف: ${p.name}`);
  }

  function saveCart() {
    localStorage.setItem('aef_cart', JSON.stringify(cart));
    updateCartCount();
  }

  function updateCartCount() {
    const total = cart.reduce((s,x) => s + (x.qty||1), 0);
    document.getElementById('cartCount').textContent = total;
  }

  function openCart() {
    const el = document.getElementById('cartItems');
    if (!cart.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🛒</div><p>السلة فارغة</p></div>';
    } else {
      el.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image||'https://placehold.co/60x60'}" alt="${item.name}"/>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${item.price} ج.م × ${item.qty||1}</div>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">🗑</button>
        </div>`).join('');
    }
    const total = cart.reduce((s,x) => s + x.price*(x.qty||1), 0);
    document.getElementById('cartTotal').textContent = `${total} ج.م`;
    document.getElementById('cartOverlay').classList.add('open');
  }

  function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    saveCart();
    openCart();
  }

  function openOrder() {
    if (!cart.length) { showToast('السلة فارغة!','error'); return; }
    closeCart();
    const total = cart.reduce((s,x) => s + x.price*(x.qty||1), 0);
    document.getElementById('orderSummary').innerHTML = `
      <div class="order-summary-title">📋 ملخص الطلب</div>
      ${cart.map(x=>`<div class="order-summary-item"><span>${x.name} ×${x.qty||1}</span><span>${x.price*(x.qty||1)} ج.م</span></div>`).join('')}
      <div class="order-summary-total"><span>الإجمالي</span><span>${total} ج.م</span></div>`;
    document.getElementById('orderOverlay').classList.add('open');
  }

  function closeOrder() { document.getElementById('orderOverlay').classList.remove('open'); }

  async function submitOrder() {
    const name = document.getElementById('oName').value.trim();
    const phone = document.getElementById('oPhone').value.trim();
    const address = document.getElementById('oAddress').value.trim();
    if (!name||!phone||!address) { showToast('برجاء تعبئة جميع الحقول المطلوبة','error'); return; }

    const order = {
      id: 'ORD_' + Date.now(),
      customer: { name, phone, address, notes: document.getElementById('oNotes').value.trim() },
      items: [...cart],
      total: cart.reduce((s,x) => s + x.price*(x.qty||1), 0),
      status: 'pending',
      createdAt: new Date().toISOString()
    };

    // Save order via GitHub API
    try {
      await saveOrderToGitHub(order);
      showToast('✅ تم إرسال طلبك بنجاح!');
      cart = [];
      saveCart();
      closeOrder();
      document.getElementById('oName').value='';
      document.getElementById('oPhone').value='';
      document.getElementById('oAddress').value='';
      document.getElementById('oNotes').value='';
    } catch {
      showToast('حدث خطأ، حاول مرة أخرى','error');
    }
  }

  async function saveOrderToGitHub(order) {
    // Fetch current file
    const fileRes = await fetch(`${GITHUB_API_BASE}/contents/${PRODUCTS_FILE_PATH}`, {
      headers: { Authorization: `token ${GITHUB_CONFIG.TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const fileData = await fileRes.json();
    const content = JSON.parse(atob(fileData.content));
    content.orders = content.orders || [];
    content.orders.push(order);
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
    await fetch(`${GITHUB_API_BASE}/contents/${PRODUCTS_FILE_PATH}`, {
      method: 'PUT',
      headers: { Authorization: `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `New order: ${order.id}`, content: encoded, sha: fileData.sha, branch: GITHUB_CONFIG.BRANCH })
    });
  }

  function handleOverlayClick(e, id) {
    if (e.target.id === id) {
      if (id==='cartOverlay') closeCart();
      if (id==='orderOverlay') closeOrder();
    }
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' '+type : '');
    setTimeout(() => t.className='toast', 3000);
  }

  loadProducts();
</script>
</body>
</html>
